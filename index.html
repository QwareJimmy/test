<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂天桃猿 APP 下載</title>

    <meta name="apple-itunes-app" content="app-id=6740470999">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* 基礎樣式設計，模擬 iOS 簡約風格 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #1d1d1f;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            color: #86868b;
            margin-bottom: 30px;
        }

        /* 下載按鈕樣式 */
        .btn-download {
            display: inline-block;
            background-color: #0071e3;
            color: #ffffff;
            padding: 12px 32px;
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 980px; /* iOS 膠囊形按鈕 */
            transition: all 0.2s ease;
        }

        .btn-download:active {
            background-color: #0077ed;
            transform: scale(0.96);
        }

        /* 備註提示 */
        .footer-note {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: #a1a1a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="background: #800000; width: 100px; height: 100px; border-radius: 22px; margin: 0 auto 20px;"></div> 
        
        <h1>樂天桃猿 Official APP</h1>
        <p>提供最新賽事資訊與會員專屬服務</p>

        <a href="https://apps.apple.com/app/id6740470999" class="btn-download">
            在 App Store 中檢視
        </a>
    </div>

    <div class="footer-note">
        本頁面將導向 Apple App Store
    </div>

    <script>
        // 如果你希望使用者一進網頁「完全不點按鈕」就直接跳轉，可以解除下方註解：
        
        window.onload = function() {
            setTimeout(function() {
                window.location.href = "https://apps.apple.com/app/id6740470999";
            }, 500);
        };
        
    </script>

</body>
</html>
