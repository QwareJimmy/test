<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在開啟 樂天桃猿 APP...</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #800000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p { color: #666; font-size: 16px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p>正在嘗試開啟 APP...</p>
    <p id="status" style="font-size: 12px; color: #999;">如果沒有跳轉，請稍候...</p>

    <script>
        function openOrDownloadApp() {
            // 1. 設定 APP 的 URL Scheme (需確認樂天桃猿正確的 scheme，通常是 rakutenmonkeys://)
            var appScheme = "rakutenmonkey://app"; 
            // 2. 設定 App Store 連結
            var appStoreUrl = "https://apps.apple.com/app/id6740470999";
            
            var startTime = Date.now();
            
            // 嘗試開啟 APP
            window.location.href = appScheme;

            // 3. 設定計時器檢查
            setTimeout(function() {
                var endTime = Date.now();
                
                // 如果在 2.5 秒內，網頁沒有被切換到背景（表示沒彈出開啟 APP 的視窗）
                // 且時間差小於 3 秒（確保不是因為手機太卡），就導向商店
                if (endTime - startTime < 3000) {
                    window.location.href = appStoreUrl;
                }
            }, 2500);
        }

        // 頁面載入後自動執行
        window.onload = openOrDownloadApp;

        // 處理使用者回到瀏覽器時的情況（避免重複跳轉）
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                // 如果頁面隱藏了，表示成功開啟 APP，清除所有可能的跳轉邏輯
                clearTimeout();
            }
        });
    </script>
</body>
</html>
